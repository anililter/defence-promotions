# Fly.io — Defence Promotions MMA
# Bu dosya `fly launch` ile oluşturuldu

app = "defence-promotions"
primary_region = "ams"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

# SQLite veritabanı için kalıcı disk
[[mounts]]
  source = "db_data"
  destination = "/app/database"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "10s"

# Ücretsiz tier makine özellikleri
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
