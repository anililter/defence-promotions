<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="currentColor" stroke-width="2.5"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="66" fill="none" stroke="currentColor" stroke-width="1.5"/>
  
  <!-- Center Vertical Line -->
  <line x1="100" y1="72" x2="100" y2="128" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Center Letters -->
  <text x="84" y="112" font-family="var(--font-inter), system-ui, -apple-system, sans-serif" font-weight="600" font-size="34" fill="currentColor" text-anchor="end" letter-spacing="-1">D</text>
  <text x="116" y="112" font-family="var(--font-inter), system-ui, -apple-system, sans-serif" font-weight="600" font-size="34" fill="currentColor" text-anchor="start" letter-spacing="-1">A</text>
  
  <!-- Path for text along curve -->
  <defs>
    <!-- Clockwise arc path for top text -->
    <path id="textPathTop" d="M 22 100 A 78 78 0 0 1 178 100" fill="none"/>
  </defs>
  
  <!-- Circular text -->
  <text font-family="var(--font-inter), system-ui, -apple-system, sans-serif" font-weight="600" font-size="10.5" fill="currentColor" letter-spacing="4.8">
    <textPath href="#textPathTop" startOffset="50%" text-anchor="middle">
      DEFENCE &amp; ATHLETICS CLUB
    </textPath>
  </text>
  
  <!-- Side dots -->
  <circle cx="23" cy="106" r="3" fill="currentColor"/>
  <circle cx="177" cy="106" r="3" fill="currentColor"/>
</svg>
